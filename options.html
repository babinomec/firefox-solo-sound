<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui; padding: 16px; min-width: 300px; }
    label { display: block; margin-bottom: 12px; }
    input[type="number"], textarea { width: 100%; box-sizing: border-box; margin-top: 4px; }
    textarea { height: 200px; font-family: monospace; }
    small { color: #666; }
    #status { color: green; margin-top: 8px; }
    button { margin-top: 8px; }
    .toggle { margin-bottom: 4px; }
    .sub { margin-left: 20px; }
    .disabled { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>
  <label class="toggle">
    <input type="checkbox" id="debounceEnabled" checked>
    Enable debounce
  </label>
  <div id="debounceSection" class="sub">
    <label>
      Threshold (seconds)
      <input type="number" id="threshold" min="0.5" max="30" step="0.5" value="2">
      <small>Sounds shorter than this are ignored (min: 0.5s).</small>
    </label>
  </div>

  <label class="toggle">
    <input type="checkbox" id="whitelistEnabled" checked>
    Enable title whitelist
  </label>
  <div id="whitelistSection" class="sub">
    <label>
      Ignored tab titles (one per line, case-insensitive)
      <textarea id="ignoredTitles"></textarea>
      <small>Tabs whose title contains any of these patterns won't trigger muting.<br>Wrap in slashes for regex: <code>/pattern/</code></small>
    </label>
  </div>

  <button id="resetBtn">Reset to defaults</button>
  <div id="status"></div>
  <script src="defaults.js"></script>
  <script src="options.js"></script>
</body>
</html>
